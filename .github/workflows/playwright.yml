name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Set up environment
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.local
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.local
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local
          cp .env.local .env.test

      - name: Verify environment setup
        run: |
          echo "Checking .env.local file:"
          cat .env.local | sed 's/=.*/=***/'
          echo ""
          echo "DATABASE_URL secret exists: ${{ secrets.DATABASE_URL != '' }}"
          echo "NEXTAUTH_SECRET secret exists: ${{ secrets.NEXTAUTH_SECRET != '' }}"
          echo "NEXTAUTH_URL secret exists: ${{ secrets.NEXTAUTH_URL != '' }}"
          echo ""
          if grep -q "DATABASE_URL=" .env.local; then
            echo "✓ DATABASE_URL found in .env.local"
          else
            echo "✗ DATABASE_URL NOT found in .env.local"
          fi

      - name: Run database migrations
        env:
          NODE_ENV: test
        run: npx drizzle-kit push

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
